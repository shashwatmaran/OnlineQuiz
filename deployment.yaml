apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz
  template:
    metadata:
      labels:
        app: quiz
    spec:
      containers:
        - name: quiz-container
          image: shashmaran/java-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
spec:
  type: NodePort
  selector:
    app: quiz
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30080
